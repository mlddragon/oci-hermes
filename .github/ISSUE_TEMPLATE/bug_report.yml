name: Bug report
description: Report a reproducible problem in repo content, templates, scripts, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue without exposing secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Deployment boundary
      options:
        - label: I removed or redacted provider account IDs, secrets, private endpoints, Matrix data, and Terraform state.
          required: true
