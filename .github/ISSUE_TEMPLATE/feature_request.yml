name: Feature request
description: Suggest an infrastructure, deployment, docs, or operations improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Do not include secrets, tokens, provider account IDs, hostnames, public IPs, private endpoints, Matrix data, Terraform state, SSH keys, or passphrases.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and any alternatives.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security, cost, and operations impact
      description: Note affected provider resources, exposed ports, identities, secrets, recurring costs, or runbooks.
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Deployment boundary
      options:
        - label: I removed or redacted provider account IDs, secrets, private endpoints, Matrix data, Terraform state, hostnames, IPs, SSH keys, and passphrases.
          required: true
